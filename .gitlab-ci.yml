range deploy-admin:
  stage: range-admin-deploy
  tags:
    - ludus-proxmox-runner
  dependencies: # If this is the first job after build in a [start-at...] pipeline, it will revert to snapshot with the old code and binaries, and no cache since cache is stored on the VM
    - build all
  rules:
    - if: $CI_COMMIT_TAG # Tags/Releases are created manually after successful full builds
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[full build\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[range tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at templates\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-admin\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
        - ludus-client/cmd/range.go
        - ludus-server/ansible/range-management/**/*
        - ludus-server/ansible/user-management/**/*
  variables:
    LUDUS_BUILD_TYPE: from-snapshot
    LUDUS_SNAPSHOT_NAME: templates_built
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 5m
  retry:
    max: 2
    when:
      - script_failure
      - job_execution_timeout
  script:
    - *ci-setup-admin
    - ludus range config get
    - ludus range deploy

range check-admin:
  stage: range-admin-check
  tags:
    - ludus-proxmox-runner
  dependencies: [] # Prevent download of build artifacts, use local cache
  rules:
    - if: $CI_COMMIT_TAG # Tags/Releases are created manually after successful full builds
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[full build\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[range tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at templates\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-admin\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
        - ludus-server/ansible/range-management/**/*
  variables:
    LUDUS_BUILD_TYPE: from-snapshot
    LUDUS_SNAPSHOT_NAME: templates_built
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 3h
  retry:
    max: 2
    when: script_failure
  script:
    - *ci-setup-admin
    - |
      while true; do
        range_state="$(ludus range list --json | jq -r '.rangeState')"
        echo "Current range state: ${range_state}"

        if [ "${range_state}" = "SUCCESS" ]; then
          break
        fi

        if [ "${range_state}" = "ERROR" ]; then
          echo "Range deployment failed. Exiting."
          ludus range errors
          exit 1
        fi

        ludus range logs --tail 20 || true
        sleep 60
      done
    - ludus range logs
    - ludus range list
    # Check to make sure the IPs were set correctly
    - export valid_last_octets=(1 11 21 254)
    - ludus range list --json | jq -e --arg allowed_octets_str "${valid_last_octets[*]}" '($allowed_octets_str | split(" ") | map(tonumber)) as $allowed_list | all(.VMs[]; ((.ip | split(".")[-1] | tonumber) as $current_octet | any($allowed_list[]; . == $current_octet)))'
    - '[ "$(ludus range list --json | jq -r ''.rangeState'')" = "SUCCESS" ]'

range snapshot-admin:
  stage: range-admin-snapshot
  tags:
    - ludus-proxmox-runner
  dependencies: [] # Prevent download of build artifacts, use local cache
  rules:
    - if: $CI_COMMIT_TAG # Tags/Releases are created manually after successful full builds
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[full build\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[range tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at templates\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-admin\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
        - ludus-server/ansible/range-management/**/*
  variables:
    LUDUS_INSTALL_STEP: take-snapshot
    LUDUS_SNAPSHOT_NAME: range_built_admin
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 5m
  retry:
    max: 2
    when: script_failure
  script:
    - echo "Snapshot complete"

