      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
        - ludus-client/cmd/user.go
        - ludus-server/src/api_user_management.go
        - ludus-server/ansible/user-management/**/*
  variables:
    LUDUS_BUILD_TYPE: from-snapshot
    LUDUS_SNAPSHOT_NAME: range_built_admin
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 15m
  retry:
    max: 2
    when: script_failure
  script:
    - *ci-setup-admin
    # Add an admin user
    - ludus user add -a -n "Test Admin" -i TA -e "ta@ludus.internal" -p "tapassword"
    - ludus users list all | grep "Test Admin"
    # Try to create a user with the same ID or name
    - set +o pipefail # We expect the first command in the next line to fail, so allow it so long as the grep succeeds
    - ludus user add -n "Test Admin" -i TA2 -e "ta@ludus.internal" -p "tapassword" 2>&1 | grep "User with that name already exists"
    - ludus user add -n "Test Admin 2" -i TA -e "ta2@ludus.internal" -p "ta2password" 2>&1 | grep "User with that ID already exists"
    - set -o pipefail
    # Get and set creds
    - ludus user creds get --user TA
    - ludus user creds set -i TA -p test-password-123
    - ludus user creds get --user TA | grep test-password-123
    # Get wireguard
    - ludus user wireguard --user TA | grep Endpoint
    # Remove admin user
    - ludus user rm -i TA
    - '! ludus users list all | grep "Test Admin"'
    # Add a normal user
    - ludus user add -n "Test User" -i TU -e "tu@ludus.internal" -p "tupassword"
    - ludus users list all | grep "Test User"
    # Get and set creds
    - ludus user creds get --user TU
    - ludus user creds set -i TU -p test-password-123
    - ludus user creds get --user TU | grep test-password-123
    # Get wireguard
    - ludus user wireguard --user TU | grep Endpoint
    # Remove normal user
    - ludus user rm -i TU
    - '! ludus users list all | grep "Test User"'

post-deploy groups-as-admin:
  stage: post-deploy-admin-groups
  tags:
    - ludus-proxmox-runner
  dependencies:
    - build all
  rules:
    - if: $CI_COMMIT_TAG # Tags/Releases are created manually after successful full builds
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[full build\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[post-deploy tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[group tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at templates\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
      - ludus-client/cmd/group.go
      - ludus-api/api_group_management.go
  variables:
    LUDUS_BUILD_TYPE: from-snapshot
    LUDUS_SNAPSHOT_NAME: range_built_admin
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 15m
  retry:
    max: 2
    when: script_failure
  script:
    - *ci-setup-admin
    # Clean up from previous retries if necessary
    - ludus groups delete ci-group-test || true
    - ludus user rm -i GTU || true
    # Ensure a normal user exists for membership tests (creates default range for GTU)
    - ludus user add -n "Group Test User" -i GTU -e "gtu@ludus.internal" -p "gtupassword"
    # Create a group
    - ludus groups create ci-group-test --description "CI Group Test"
    - ludus groups list | grep ci-group-test
    # Add user to group
    - ludus groups add user GTU ci-group-test
    - ludus groups members ci-group-test | grep GTU
    - set +o pipefail
    - ludus groups add user GTU ci-group-test 2>&1 | grep "already a member"
    - set -o pipefail
    # Grant group access to CIA's default range
    - ludus groups add range CIA ci-group-test
    - ludus groups ranges ci-group-test | grep CIA
    # Verify that GTU now has access to CIA's range via group
    - ludus range users CIA | grep GTU
    - export GTU_RANGE_NETWORK=$(ludus -r GTU range list --json | jq '.rangeNumber' | awk '{printf "10.%d.0.0/16", $0}')
    - ludus --user GTU user wireguard | grep $GTU_RANGE_NETWORK
    # Idempotency/conflict on range access
    - set +o pipefail
    - ludus groups add range CIA ci-group-test 2>&1 | grep "already has access"
    - set -o pipefail
    # Remove user from group, ensure access is gone
    - ludus groups remove user GTU ci-group-test
    - '! ludus range users CIA | grep GTU'
    - '! ludus --user GTU range accessible | grep CIA'
    - '! ludus --user GTU user wireguard | grep $GTU_RANGE_NETWORK'
    # Re-add user to group and then remove range access from group and verify access is gone
    - ludus groups add user GTU ci-group-test
    - ludus groups remove range CIA ci-group-test
    - '! ludus groups ranges ci-group-test | grep CIA'
    - '! ludus --user GTU range accessible | grep CIA'
    # Add GTU as a manager, then have them add CIA
    - set +o pipefail
    - ludus --user GTU groups add user CIA ci-group-test 2>&1 | grep "You are not a manager of this group and cannot add users to it"
    - set -o pipefail
    - ludus groups remove user GTU ci-group-test
    - ludus groups add user GTU ci-group-test --manager
    - ludus groups members ci-group-test | grep GTU | grep manager
    - ludus --user GTU groups add user CIA ci-group-test
    - ludus groups members ci-group-test | grep CIA | grep member
    # As GTU (manager) try to add a range to the group that GTU does not have access to
    - set +o pipefail
    - ludus --user GTU groups add range CIA ci-group-test 2>&1 | grep "You do not have access to range CIA and cannot add it to group ci-group-test"
    - set -o pipefail
    # As GTU (manager) try to add a range to the group that GTU does have access to
    - ludus --user GTU groups add range GTU ci-group-test
    - ludus groups ranges ci-group-test | grep GTU
    # As GTU (manager) remove a user from the group
    - ludus --user GTU groups remove user CIA ci-group-test
    - '! ludus groups members ci-group-test | grep CIA | grep member'
    # As GTU (manager) remove a range from the group
    - ludus --user GTU groups remove range GTU ci-group-test
    - '! ludus groups ranges ci-group-test | grep GTU'
    # Bulk operation tests
    # Create additional test users for bulk operations
    - ludus user add -n "Bulk Test User 1" -i BTU1 -e "btu1@ludus.internal" -p "btupassword" || true
    - ludus user add -n "Bulk Test User 2" -i BTU2 -e "btu2@ludus.internal" -p "btupassword" || true
    # Test bulk add users (multiple users at once)
    - ludus groups add user BTU1,BTU2 ci-group-test
    - ludus groups members ci-group-test | grep BTU1
    - ludus groups members ci-group-test | grep BTU2
    # Test bulk add ranges (multiple ranges at once, if GTU range still exists)
    - ludus groups add range GTU,CIA ci-group-test
    - ludus groups ranges ci-group-test | grep GTU
    - ludus groups ranges ci-group-test | grep CIA
    # Test bulk remove users (multiple users at once)
    - ludus groups remove user BTU1,BTU2 ci-group-test
    - '! ludus groups members ci-group-test | grep BTU1'
    - '! ludus groups members ci-group-test | grep BTU2'
    # Test bulk remove ranges (multiple ranges at once)
    - ludus groups remove range GTU,CIA ci-group-test
    - '! ludus groups ranges ci-group-test | grep GTU'
    - '! ludus groups ranges ci-group-test | grep CIA'
    # Test bulk operation with mixed valid/invalid items (error handling)
    # Add a valid user first
    - ludus groups add user BTU1 ci-group-test
    # Try to add the same user again along with a new one (should partially succeed)
    - set +o pipefail
    - ludus groups add user BTU1,BTU2 ci-group-test 2>&1 | grep -E "(already a member|Successfully added)"
    - set -o pipefail
    # Verify BTU2 was added despite BTU1 error
    - ludus groups members ci-group-test | grep BTU2
    # Cleanup bulk test users
    - ludus user rm -i BTU1 || true
    - ludus user rm -i BTU2 || true
    # Delete group and cleanup user
    - ludus groups delete ci-group-test
    - '! ludus groups list | grep ci-group-test'
    - ludus user rm -i GTU

post-deploy blueprints-as-admin:
  stage: post-deploy-admin-blueprints
  tags:
    - ludus-proxmox-runner
  dependencies:
    - build all
  rules:
    - if: $CI_COMMIT_TAG # Tags/Releases are created manually after successful full builds
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[full build\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[post-deploy tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[blueprint tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at templates\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
      - ludus-client/cmd/blueprint.go
      - ludus-api/api_blueprint_management.go
  variables:
    LUDUS_BUILD_TYPE: from-snapshot
    LUDUS_SNAPSHOT_NAME: range_built_admin
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 15m
  retry:
    max: 2
    when: script_failure
  script:
    - *ci-setup-admin
    # Fast blueprint-only flow with no extra user/range fixture setup
    - ludus blueprint rm ci-bp-main --no-prompt || true
    - ludus blueprint rm ci-bp-copy --no-prompt || true
    # Create, list, fetch config, copy, apply, and remove as admin
    - ludus blueprint create --id ci-bp-main --name "CI Blueprint Main" --description "created in CI" --from-range CIA
    - ludus blueprint list | grep ci-bp-main
    - ludus blueprint config get ci-bp-main > /tmp/ci-bp-main-raw.yml
    - test -s /tmp/ci-bp-main-raw.yml
    - ludus blueprint access users ci-bp-main | grep CIA
    - ludus blueprint access groups ci-bp-main
    - ludus blueprint create --from-blueprint ci-bp-main --id ci-bp-copy --name "CI BP Copy"
    - ludus blueprint list | grep ci-bp-copy
    - ludus blueprint apply ci-bp-main --target-range CIA --force
    - ludus range config get > /tmp/ci-bp-main-range-after-apply.yml
    - diff -u /tmp/ci-bp-main-raw.yml /tmp/ci-bp-main-range-after-apply.yml
    - set +o pipefail
    - ludus blueprint create --id 1bad --name "Bad Blueprint" --from-range CIA 2>&1 | grep "Blueprint ID must be a valid ID"
    - ludus blueprint create --id ci-bp-main --name "Duplicate Blueprint" --from-range CIA 2>&1 | grep "already in use"
    - ludus blueprint create --id ci-bp-missing-range --name "Missing Range Blueprint" --from-range NOTARANGE 2>&1 | grep "Range NOTARANGE not found"
    - set -o pipefail
    # Cleanup
    - ludus blueprint rm ci-bp-copy --no-prompt || true
    - '! ludus blueprint list | grep ci-bp-copy'
    - ludus blueprint rm ci-bp-main --no-prompt || true
    - '! ludus blueprint list | grep ci-bp-main'

post-deploy ranges-as-admin:
  stage: post-deploy-admin-ranges
  tags:
    - ludus-proxmox-runner
  dependencies: [] # Prevent download of build artifacts, use local cache
  rules:
    - if: $CI_COMMIT_TAG # Tags/Releases are created manually after successful full builds
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[full build\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[post-deploy tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[range mgmt tests\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[skip ci\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at templates\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-admin\]/
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at range-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at post-deploy-user\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[start-at integration\]/
      when: never
    - if: $CI_COMMIT_MESSAGE =~ /\[manual\]/
      when: never
    - changes:
      - ludus-client/cmd/range.go
      - ludus-api/api_range_management.go
      - ludus-api/api_log_history.go
      - ludus-api/range_access.go
      - ludus-api/middleware.go
      - ludus-api/process.go
      - ludus-server/ansible/range-management/tasks/make-rdp-files.yml
      - ludus-server/ansible/range-management/ludus.yml
  variables:
    LUDUS_BUILD_TYPE: from-snapshot
    LUDUS_SNAPSHOT_NAME: range_built_admin
    GIT_STRATEGY: none # Don't re-clone the repo, since this will always come after the build stage
  timeout: 15m
  retry:
    max: 2
    when: script_failure
  script:
    - *ci-setup-user # Ensure CIU user is created
    - *ci-setup-admin
    # Log history: verify a success entry was saved from the earlier deploy
    - ludus range logs --history --json | jq -e 'length > 0'
    - ludus range logs --history --json | jq -e '.[0].status == "success"'
    - export RANGE_LOG_ID=$(ludus range logs --history --json | jq -r '.[0].id')
    - ludus range logs --history --id "$RANGE_LOG_ID" | grep -q "PLAY"
    # Log history: verify an invalid ID returns an error
    - set +o pipefail
    - 'ludus range logs --history --id nonexistent 2>&1 | grep "Log entry not found"'
    - set -o pipefail
    # Log history: deploy a range that will fail and verify the failure is recorded
    - ludus range rm-range -r CIA-log-err --no-prompt --force || true
    - ludus range create -n "CIA Log Error Test" -r CIA-log-err
    - ludus ansible role add -d /opt/ludus/ci/roles/always_fails --force
    - ludus range config set -f /opt/ludus/ci/configs/small-range-error.yml -r CIA-log-err
    - ludus range deploy -r CIA-log-err
    - while [ "$(ludus range list --json -r CIA-log-err | jq -r '.rangeState')" == "DEPLOYING" ]; do sleep 15; done
    - ludus range list --json -r CIA-log-err | jq -e '.rangeState == "ERROR"'
    - ludus range logs --history --json -r CIA-log-err | jq -e '.[0].status == "failure"'
    - export ERR_LOG_ID=$(ludus range logs --history --json -r CIA-log-err | jq -r '.[0].id')
    - ludus range logs --history --id "$ERR_LOG_ID" -r CIA-log-err | grep -q "This role always fails"
    - ludus range rm-range -r CIA-log-err --no-prompt --force
    # Regression: admin abort with -r (no --user) should find the process by LUDUS_RANGE_ID
    - ludus range rm-range -r CIU-abort-test --no-prompt --force || true
    - ludus range create -n "CIU Abort Test" -r CIU-abort-test --user CIU
    - ludus range config set -f /opt/ludus/ci/configs/small-range.yml -r CIU-abort-test --user CIU
    - ludus range deploy -r CIU-abort-test --user CIU
    - sleep 5 # Wait for ansible process to start
    - ludus range list --json -r CIU-abort-test --user CIU | jq -e '.rangeState == "DEPLOYING"'
    # Abort using only -r (no --user) — previously failed with "no ansible process found for user CIA"
    - ludus range abort -r CIU-abort-test
    - ludus range list --json -r CIU-abort-test --user CIU | jq -e '.rangeState == "ABORTED"'
    - ludus range rm-range -r CIU-abort-test --no-prompt --force
    # Clean up potential leftovers (ignore errors)
    - ludus range rm-range -r CIA-extra-1 --no-prompt --force || true
    - ludus range rm-range -r CIU-extra-1 --no-prompt --force || true
    - ludus range rm-range -r CIU-extra-2 --no-prompt --force || true
    - ludus range rm-range -r CIU-fallback --no-prompt --force || true
    - ludus range rm-range -r CIU-other --no-prompt --force || true
    - ludus range rm-range -r CIU-solo --no-prompt --force || true
    # Create two additional ranges for CIU (standard user)
    - ludus range create -n "CIU Extra Range 1" -r CIU-extra-1 --user CIU
    - ludus range create -n "CIU Extra Range 2" -r CIU-extra-2 --user CIU
    # Verify CIU can access both ranges (admin impersonation)
    - ludus --user CIU range accessible | grep CIU-extra-1
    - ludus --user CIU range accessible | grep CIU-extra-2
    # Verify users list for the new range contains CIU
    - ludus range users CIU-extra-1 | grep CIU
    # Delete first CIU range (no VMs => no --force)
    - ludus range rm-range -r CIU-extra-1 --no-prompt
    - '! ludus --user CIU range accessible | grep CIU-extra-1'
    # Delete second CIU range
    - ludus range rm-range -r CIU-extra-2 --no-prompt
    - '! ludus --user CIU range accessible | grep CIU-extra-2'
    # Create and delete an extra range for CIA (admin)
    - ludus range create -n "CIA Extra Range" -r CIA-extra-1 --user CIA
    - ludus --user CIA range accessible | grep CIA-extra-1
    - ludus range rm-range -r CIA-extra-1 --no-prompt
    - '! ludus --user CIA range accessible | grep CIA-extra-1'
    # Assign / share range (access-control playbook): on, empty, router off ---
    - ludus range revoke CIU CIA || true
    # 1) Deployed range with VMs powered on: assign succeeds
    - ludus range assign CIU CIA
    - ludus range users CIA | grep CIU
    - ludus range revoke CIU CIA
    # 2) Empty range (never deployed): assign succeeds (no router in cluster)
    - ludus range rm-range -r CIA-share-assign-test --no-prompt --force || true
    - ludus range create -n "CIA share assign empty" -r CIA-share-assign-test
    - ludus range assign CIU CIA-share-assign-test
    - ludus range users CIA-share-assign-test | grep CIU
    - ludus range revoke CIU CIA-share-assign-test
    - ludus range rm-range -r CIA-share-assign-test --no-prompt
    # 3) Router VM exists but powered off: assign fails with clear message
    - ludus range revoke CIU CIA || true
    - ludus power off -n CIA-router-debian11-x64
    - timeout 120 bash -c 'until [[ $(ludus range list --json | jq -r ".VMs[] | select(.name == \"CIA-router-debian11-x64\") | .poweredOn") == "false" ]]; do sleep 5; done'
    - set +o pipefail
    - ludus range assign CIU CIA 2>&1 | grep -F "The range router you are sharing access to must be accessible. Make sure the router is powered on and accessible."
    - set -o pipefail
    - '! ludus range users CIA | grep CIU'
    - ludus power on -n CIA-router-debian11-x64
    - timeout 180 bash -c 'until [[ $(ludus range list --json | jq -r ".VMs[] | select(.name == \"CIA-router-debian11-x64\") | .poweredOn") == "true" ]]; do sleep 5; done'
    # Deploy a simple range, then delete it to verify deleting a range with VMs works
    - ludus range create -n "CIA Test Range" -r CIA-test
    - ludus range config set -f /opt/ludus/ci/configs/small-range.yml -r CIA-test
    - ludus range deploy -r CIA-test
    - while [ "$(ludus range list --json -r CIA-test | jq -r '.rangeState')" != "SUCCESS" ]; do ludus range -r CIA-test logs --tail 20; sleep 60; done
    - ludus range rm-range -r CIA-test --no-prompt --force
    # --- Default range delete test ---
    # Deleting the default range throws an error for range function but allows non-range functions to work
    - export CIU_ORIGINAL_DEFAULT=$(ludus --user CIU range default get --json | jq -r '.defaultRangeID')
    - ludus range create -n "CIU Fallback Range" -r CIU-fallback --user CIU
    - ludus --user CIU range default set CIU-fallback
    - ludus range create -n "CIU Other Range" -r CIU-other --user CIU
    - ludus range rm-range -r CIU-fallback --no-prompt
    # CIU's default should not change
    - ludus --user CIU range default get --json | jq -r ".defaultRangeID" | grep CIU-fallback
    # CIU should still be able to list ranges (not locked out)
    - ludus --user CIU range accessible
    # CIU should not be able to do range actions
    - set +o pipefail
    - ludus --user CIU range config get 2>&1 | grep "Range CIU-fallback not found for user CIU."
    - ludus --user CIU power off -n "all" 2>&1 | grep "Range CIU-fallback not found for user CIU."
    - set -o pipefail
    # Check that a different range can be assigned default, and range functions work
    - ludus --user CIU range default set CIU-other
    - ludus --user CIU range default get --json | jq -r ".defaultRangeID" | grep CIU-other
    - ludus --user CIU range config get
    - ludus --user CIU range accessible
    # Clean up
    - ludus range rm-range -r CIU-other --no-prompt || true
    - ludus --user CIU range default set "$CIU_ORIGINAL_DEFAULT"
    # Verify the default was reassigned to CIU's original range
    - ludus --user CIU range default get --json | jq -r '.defaultRangeID' | grep "$CIU_ORIGINAL_DEFAULT"

