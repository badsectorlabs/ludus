# subscription_refs.yml: declares license-gated roles this blueprint depends on.
#
# Only required when the blueprint references roles from the Ludus subscription
# catalog (Enterprise / private role catalog). Plain galaxy roles and local
# roles do NOT belong here -- pin those in requirements.yml or ship under
# blueprints/<id>/roles/ respectively.
#
# At apply time, Ludus reads this file and refuses with HTTP 403 when the target
# instance has no valid license, or when the catalog doesn't cover one of the
# named roles. The bytes of subscription roles are never carried in a bundle;
# only the names are recorded here so a non-licensed instance can stage the
# bundle (export/import) and only fail on apply.
#
# Both shapes are accepted:
#   roles:
#     - ludus_ghosts_client          # bare scalar
#     - name: ludus_adcs             # structured form
#
# Delete this file (or this whole example block) if your blueprint doesn't use
# any subscription roles.

roles: []

# Example with subscription roles declared:
# roles:
#   - ludus_ghosts_client
#   - ludus_adcs
