# Galaxy roles, collections, and subscription roles this blueprint needs.
# Every role referenced under `roles:` in range-config.yml must appear here
# (or as a directory under the source's top-level roles/), otherwise the
# sync surfaces an undeclared-dependency warning.

roles:
  - name: geerlingguy.docker
    version: 7.4.4

# ludusci.ci_utils is vendored under the source's ansible/collections/, so the
# local copy wins over galaxy resolution — installing this blueprint must pull
# in the vendored copy.
collections:
  - name: ludusci.ci_utils

