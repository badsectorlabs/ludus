- name: Check if sysprepd file exists
  ansible.windows.win_stat:
    path: C:\ludus\sysprep\sysprepd
  register: sysprepd_file

- name: Skip tasks if sysprepd file exists
  ansible.builtin.meta: end_host
  when: sysprepd_file.stat.exists

- name: Create C:\Windows\Setup\Scripts directory
  ansible.windows.win_file:
    path: C:\Windows\Setup\Scripts
    state: directory

- name: Copy SetupComplete.cmd to C:\Windows\Setup\Scripts
  ansible.windows.win_copy:
    src: windows/sysprep/SetupComplete.cmd
    dest: C:\Windows\Setup\Scripts\SetupComplete.cmd

- name: Create C:\ludus\sysprep directory
  ansible.windows.win_file:
    path: C:\ludus\sysprep
    state: directory
    recursive: true

- name: Copy oob-disable.xml to C:\ludus\sysprep
  ansible.windows.win_copy:
    src: windows/sysprep/oob-disable.xml
    dest: C:\ludus\sysprep\oob-disable.xml

# Sysprep can be blocked by an Edge AppX package installed for one user but
# not provisioned for all users. Try Sysprep first so healthy machines keep
# their installed packages. Only remove the package when the current attempt
# reports that exact failure, then retry once.
- name: Clear previous Sysprep error log
  ansible.windows.win_file:
    path: C:\Windows\System32\Sysprep\Panther\setuperr.log
    state: absent

- name: Generalize the Windows VM
  block:
    - name: Run Sysprep
      ansible.windows.win_shell: C:\Windows\System32\Sysprep\sysprep.exe /generalize /quiet /reboot /oobe /unattend:C:\ludus\sysprep\oob-disable.xml

    - name: Wait for WinRM to stop for the Sysprep reboot
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 5986
        state: stopped
        timeout: 180
      delegate_to: localhost

  rescue:
    # https://www.deploymentresearch.com/fixing-why-sysprep-fails-in-windows-10-due-to-windows-store-updates/
    # https://learn.microsoft.com/en-us/troubleshoot/windows-client/setup-upgrade-and-drivers/sysprep-fails-remove-or-update-store-apps#cause
    - name: Remove Edge AppX packages reported by the failed Sysprep attempt
      ansible.windows.win_powershell:
        script: |
          $logPath = 'C:\Windows\System32\Sysprep\Panther\setuperr.log'
          [string]$log = Get-Content -Path $logPath -Raw -ErrorAction Stop
          $pattern = 'Package (?<package>\S*[Ee]dge\S*) was installed for a user, but not provisioned for all users'
          $packageNames = @(
            [regex]::Matches($log, $pattern) |
              ForEach-Object { $_.Groups['package'].Value } |
              Sort-Object -Unique
          )

          if ($packageNames.Count -eq 0) {
            throw "Sysprep did not reboot and did not report an Edge AppX blocker.`n$log"
          }

          foreach ($packageName in $packageNames) {
            $packages = @(
              Get-AppxPackage -AllUsers |
                Where-Object { $_.PackageFullName -eq $packageName }
            )
            if ($packages.Count -eq 0) {
              throw "Sysprep reported Edge package '$packageName', but it is not installed."
            }
            foreach ($package in $packages) {
              Remove-AppxPackage -Package $package.PackageFullName -AllUsers -ErrorAction Stop
            }
          }

    - name: Clear Sysprep error log before retry
      ansible.windows.win_file:
        path: C:\Windows\System32\Sysprep\Panther\setuperr.log
        state: absent

    - name: Retry Sysprep after removing the blocking Edge packages
      ansible.windows.win_shell: C:\Windows\System32\Sysprep\sysprep.exe /generalize /quiet /reboot /oobe /unattend:C:\ludus\sysprep\oob-disable.xml

    - name: Wait for WinRM to stop for the retried Sysprep reboot
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 5986
        state: stopped
        timeout: 180
      delegate_to: localhost

- name: Wait for WinRM credentials to work after Sysprep
  ansible.builtin.wait_for_connection:
    delay: 60
    timeout: 1800
    sleep: 10
    connect_timeout: 5

- name: Verify Windows reports that Sysprep succeeded
  ansible.windows.win_stat:
    path: C:\Windows\System32\Sysprep\Sysprep_succeeded.tag
  register: sysprep_succeeded
  failed_when: not sysprep_succeeded.stat.exists

- name: Create sysprepd file
  ansible.windows.win_file:
    path: C:\ludus\sysprep\sysprepd
    state: touch

- name: Hostname change after sysprep
  ansible.windows.win_hostname:
    name: "{{ vm_hostname }}"
  register: res

# win_hostname invalidates the cached WinRM/NTLM session (it is bound to the
# computer name), so the next task's connection is rejected before it can run.
# Reset the connection so the reboot reconnects fresh, and retry to ride out the
# brief post-rename rejection window.
- name: Reset connection after rename
  ansible.builtin.meta: reset_connection

- name: Reboot
  ansible.windows.win_reboot:
  register: sysprep_hostname_reboot
  until: sysprep_hostname_reboot is succeeded
  retries: 5
  delay: 20
  when: res.reboot_required

- name: Wait for the host's control interface (WinRM via HTTPS) to come up
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 5986
    delay: 10
    state: started
  delegate_to: localhost
  register: wait_result
  when: res.reboot_required
