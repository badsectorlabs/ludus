---
- name: Create a container and install supabase inside it
  block:
    - name: Check if something already exists at 192.0.2.1
      ansible.builtin.shell:
        cmd: |
          ping -c 1 192.0.2.1
      register: check_result
      failed_when: false

    - name: Alert user that 192.0.2.1 is already in use and refuse to continue
      ansible.builtin.fail:
        msg: |
          The IP address 192.0.2.1 is already in use. Please remove the existing resource that is using it (KMS?) and try again.
      when: check_result.rc == 0

    - name: Get the storage pool to use for the template
      ansible.builtin.shell:
        cmd: |
          pvesm status -content vztmpl 2>/dev/null | tail -n +2 | sort -k6 -rn | head -1 | awk '{print $1}'
      register: storage_pool_template
      failed_when: false

    - name: Alert user that the storage pool for the template is not found and refuse to continue
      ansible.builtin.fail:
        msg: |
          A storage pool for the template could not be found. Please create a storage pool that can be used for container templates and try again.
      when: storage_pool_template.rc != 0 or storage_pool_template.stdout == ''

    - name: Save the storage pool to a fact
      ansible.builtin.set_fact:
        storage_template: "{{ storage_pool_template.stdout | trim }}"
      when: storage_pool_template.rc == 0

    - name: Show the storage pool for the template
      ansible.builtin.debug:
        msg: "Using storage pool {{ storage_template }} for the template"

    - name: Get the Debian 12 template name
      ansible.builtin.shell:
        cmd: |
          pveam available | grep -i debian-12-standard | awk '{print $2}'
      register: template_name

    - name: Alert user that the Debian 12 template is not found and refuse to continue
      ansible.builtin.fail:
        msg: |
          The Debian 12 template is available. Cannot continue.
      when: template_name.rc != 0

    - name: Save the template name to a fact
      ansible.builtin.set_fact:
        template: "{{ template_name.stdout | trim }}"

    - name: Show the template name
      ansible.builtin.debug:
        msg: "Using template: {{ template }}"

    - name: Check if the container template exists
      ansible.builtin.shell:
        cmd: |
          pveam list {{ storage_template }} | grep -q {{ template }}
      register: template_exists
      failed_when: false

    - name: Download the container template
      ansible.builtin.shell:
        cmd: |
          pveam download {{ storage_template }} {{ template }}
      register: download_result
      when: template_exists.rc != 0

    - name: Alert user that the container template download failed and refuse to continue
      ansible.builtin.fail:
        msg: |
          The container template download failed. Please check your internet connection and try again.
      when:
        - template_exists.rc != 0
        - download_result.rc is defined
        - download_result.rc != 0

    - name: Get the storage pool to use for the container
      ansible.builtin.shell:
        cmd: |
          pvesm status -content rootdir 2>/dev/null | tail -n +2 | sort -k6 -rn | head -1 | awk '{print $1}'
      register: storage_pool_container
      failed_when: false

    - name: Alert user that the storage pool for the container is not found and refuse to continue
      ansible.builtin.fail:
        msg: |
          A storage pool for the container is not found. Please create a storage pool that can be used for containers and try again.
      when: storage_pool_container.rc != 0 or storage_pool_container.stdout == ''

    - name: Save the storage pool to a fact
      ansible.builtin.set_fact:
        storage_container: "{{ storage_pool_container.stdout | trim }}"
      when: storage_pool_container.rc == 0

    - name: Show the storage pool for the container
      ansible.builtin.debug:
        msg: "Using storage pool {{ storage_container }} for the container"

    - name: Get next available container ID
      ansible.builtin.shell:
        cmd: |
          pvesh get /cluster/nextid 2>/dev/null || echo "1000"
      register: next_container_id

    - name: Set the next container ID to a fact
      ansible.builtin.set_fact:
        container_id: "{{ next_container_id.stdout | trim }}"

    - name: Show the next container ID
      ansible.builtin.debug:
        msg: "Using next container ID: {{ container_id }}"

    - name: Create the install directory for the Supabase credentials
      ansible.builtin.file:
        path: "{{ ludus_install_path }}/install/supabase"
        state: directory
        mode: '0700'
        owner: root
        group: root


    - name: Generate secrets for the Supabase container and add them to the ludus config.yml
      ansible.builtin.set_fact:
        supabase_postgres_password: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/postgres_password', length=24, chars=['ascii_letters', 'digits']) }}"
        supabase_jwt_secret: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/jwt_secret', length=32, chars=['ascii_letters', 'digits']) }}"
        supabase_vault_enc_key: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/vault_enc_key', length=32, chars=['ascii_letters', 'digits']) }}"
        supabase_dashboard_password: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/dashboard_password', length=24, chars=['ascii_letters', 'digits']) }}"
        supabase_secret_key_base: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/secret_key_base', length=45, chars=['ascii_letters', 'digits']) }}"
        container_password: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/container_password', length=12, chars=['ascii_letters', 'digits']) }}"
        supabase_database_password: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/database_password', length=24, chars=['ascii_letters', 'digits']) }}"
        supabase_database_salt: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/database_salt', length=24, chars=['ascii_letters', 'digits']) }}"

    - name: Generate the JWT secret for the Supabase container
      ansible.builtin.shell:
        cmd: |
            python3 {{ ludus_install_path }}/ansible/proxmox-install/generate_jwt.py $(cat {{ ludus_install_path }}/install/supabase/jwt_secret) service_role > {{ ludus_install_path }}/install/supabase/service_role_key
            python3 {{ ludus_install_path }}/ansible/proxmox-install/generate_jwt.py $(cat {{ ludus_install_path }}/install/supabase/jwt_secret) anon > {{ ludus_install_path }}/install/supabase/anon_key

    - name: Load the JWT secrets into facts
      ansible.builtin.set_fact:
        supabase_anon_key: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/anon_key') }}"
        supabase_service_role_key: "{{ lookup('ansible.builtin.password', ludus_install_path + '/install/supabase/service_role_key') }}"

    - name: Create database container
      ansible.builtin.shell:
        cmd: |
          pct create {{ container_id }} {{ storage_template }}:vztmpl/{{ template }} --hostname ludus-services --memory 2048 --cores 2 --rootfs {{ storage_container }}:100 --onboot 1 --startup order=1 --net0 name=eth0,bridge=vmbr1000,ip=192.0.2.1/24,gw=192.0.2.254,firewall=1 --nameserver 192.0.2.254 --password {{ container_password }} --features nesting=1,keyctl=1 --pool ADMIN

    - name: Start the container
      ansible.builtin.shell:
        cmd: |
          pct start {{ container_id }}

    - name: Wait for the container to be running
      ansible.builtin.shell:
        cmd: |
          pct status {{ container_id }} | grep -q "status: running"
      register: container_running
      retries: 30
      delay: 2
      until: container_running.rc == 0

    - name: Wait for network connectivity in the container
      ansible.builtin.shell:
        cmd: |
          pct exec {{ container_id }} -- ping -c 1 8.8.8.8
      register: network_ready
      retries: 60
      delay: 1
      until: network_ready.rc == 0

    - name: Install dependencies in the container
      ansible.builtin.shell:
        cmd: |
          pct exec {{ container_id }} -- bash -c "
            apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq curl wget ca-certificates git >/dev/null 2>&1
            ln -sf /usr/share/zoneinfo/UTC /etc/localtime 2>/dev/null
            echo 'net.core.somaxconn=1024' >> /etc/sysctl.conf
            echo 'net.ipv4.tcp_keepalive_time=60' >> /etc/sysctl.conf
            sysctl -p >/dev/null 2>&1
            if ! grep -q '/usr/local/bin' /etc/profile 2>/dev/null; then
                echo 'export PATH="/usr/local/bin:$PATH"' >> /etc/profile
            fi
            if [[ -f /etc/bash.bashrc ]] && ! grep -q '/usr/local/bin' /etc/bash.bashrc 2>/dev/null; then
                echo 'export PATH="/usr/local/bin:$PATH"' >> /etc/bash.bashrc
            fi
          "

    - name: Install Supabase inside the container
      ansible.builtin.shell:
        cmd: |
          pct exec {{ container_id }} -- bash -c "
            curl -s https://get.docker.com | sh
            git clone --depth 1 https://github.com/supabase/supabase
            cd supabase
            git checkout 081a75350eaf77ddf2f38429adf7de53017130f0 # Known good commit 2025-09-23
            cd ..
            mkdir supabase-ludus
            cp -rf supabase/docker/* supabase-ludus/
            rm supabase-ludus/docker-compose.yml # We will use our own stripped down version
          "


    - name: Create the .env file for the Supabase container
      ansible.builtin.template:
        src: supabase-env.j2
        dest: "{{ ludus_install_path }}/install/supabase/env"
        mode: '0600'
        owner: root
        group: root

    - name: Copy the .env file to the Supabase container
      ansible.builtin.shell:
        cmd: |
          pct push {{ container_id }} "{{ ludus_install_path }}/install/supabase/env" /supabase-ludus/.env

    - name: Copy the compose file to the Supabase container
      ansible.builtin.shell:
        cmd: |
          pct push {{ container_id }} "{{ ludus_install_path }}/ansible/proxmox-install/templates/supabase-compose.yml" /supabase-ludus/docker-compose.yml

    - name: Update the Ludus config.yml with the Supabase variables
      ansible.builtin.blockinfile:
        path: "{{ ludus_install_path }}/config.yml"
        block: |
          supabase_url: http://192.0.2.1:8000/
          jwt_secret: "{{ supabase_jwt_secret }}"
          service_role_key: "{{ supabase_service_role_key }}"
          database_url: "postgresql://postgres:{{ supabase_postgres_password }}@192.0.2.1:5432/postgres"
          database_encryption_password: "{{ supabase_database_password }}"
          database_encryption_salt: "{{ supabase_database_salt }}"
        state: present
        marker: "# {mark} ANSIBLE MANAGED BLOCK FOR SUPABASE CONNECTION"

    - name: Start the Supabase containers
      ansible.builtin.shell:
        cmd: |
          pct exec {{ container_id }} -- bash -c "
            cd /supabase-ludus
            docker compose up -d db auth rest kong studio
          "

  rescue:
    - name: Stop the container
      ansible.builtin.shell:
        cmd: |
          pct stop {{ container_id }}
      when: container_id is defined
      failed_when: false

    - name: Destroy the container
      ansible.builtin.shell:
        cmd: |
          pct destroy {{ container_id }}
      when: container_id is defined
      failed_when: false

    - name: Alert user that the installation failed
      ansible.builtin.fail:
        msg: |
          The installation of the Ludus database failed. Please check the logs.
