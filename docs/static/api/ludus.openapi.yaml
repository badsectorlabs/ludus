  /templates/logs/history:
    get:
      summary: List template build log history
      deprecated: false
      description: >
        Returns a list of historical log entries for the user's template builds.
        Each entry includes the log id, status, start/end times, and created
        timestamp. A `running` entry is created for each build start and
        finalized to `success`, `failure`, or `aborted` when that build ends.
        Parallel template builds create one history entry per template build.
        Use the log id to retrieve the full log content via
        /templates/logs/history/{logID}.
      operationId: getTemplateLogHistory
      tags:
        - Template Management
      parameters: []
      responses:
        '200':
          description: A list of log history entries for the user's template builds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LogHistoryEntry'
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /templates/logs/history/{logID}:
    get:
      summary: Retrieve a specific template log history entry
      deprecated: false
      description: >
        Returns the full log content for a specific historical template build
        log entry. The log entry must belong to the requesting user.
      operationId: getTemplateLogHistoryByID
      tags:
        - Template Management
      parameters:
        - name: logID
          in: path
          description: The id of the log history entry to retrieve
          required: true
          example: abc123
          schema:
            type: string
      responses:
        '200':
          description: The full log history entry including log content
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique identifier for the log history entry
                    example: abc123def456
                  status:
                    type: string
                    description: The final status of the operation
                    enum:
                      - success
                      - failure
                    example: success
                  start:
                    type: string
                    format: date-time
                    description: When the operation started
                    example: '2024-01-15T10:30:00.000Z'
                  end:
                    type: string
                    format: date-time
                    description: When the operation completed
                    example: '2024-01-15T10:45:00.000Z'
                  created:
                    type: string
                    format: date-time
                    description: When the log history entry was created
                    example: '2024-01-15T10:45:01.000Z'
                  result:
                    type: string
                    description: The full log content
                    example: >
                      2024-01-15 10:30:00,810 p=2034571 u=john-doe n=ansible |
                      PLAY [Deploy test range] *****
          headers: {}
        '400':
          description: logID not provided
          headers: {}
        '403':
          description: Log entry does not belong to this user
          headers: {}
        '404':
          description: Log entry not found
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
