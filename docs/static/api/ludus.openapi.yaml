          headers: {}
        '400':
          description: Error with request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: User with that name already exists
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
