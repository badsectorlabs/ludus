                  example: ["students", "red-team"]
                defaultQuotaRAM:
                  type: integer
                  description: Default RAM limit in GB (0 = remove limit)
                  example: 32
                defaultQuotaCPU:
                  type: integer
                  description: Default CPU core limit (0 = remove limit)
                  example: 8
                defaultQuotaVMs:
                  type: integer
                  description: Default VM count limit (0 = remove limit)
                  example: 5
                defaultQuotaRanges:
                  type: integer
                  description: Default range count limit (0 = remove limit)
                  example: 2
      responses:
        '200':
          description: group quotas updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: "Quotas updated for 2 group(s)"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "quota values must be >= 0"
        '403':
          description: Unauthorized - not an admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: You are not an admin and cannot set group quotas
      security:
        - JWT: []
        - ApiKeyAuth: []
