                  example: 'false'
      responses:
        '201':
          description: role installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    examples:
                      - Successfully installed role
                x-apidog-orders:
                  - result
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Created
        '400':
          description: Error installing role - bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - Invalid boolean value
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Bad Request
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - You are not authorized to perform this ansible action
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Forbidden
        '500':
          description: Error installing role - server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - 'Unable to install the ansible role: <error>'
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Internal Server Error
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Ansible Management
      x-apidog-status: released
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24251969-run
  /ansible/collection:
    post:
      summary: Install an Ansible collection
      deprecated: false
      description: >
        Install an ansible collection by name or URL.

        Admins can pass a userID parameter to install a collection for other
        users.

        Ansible collections can only be removed by rm-ing their directories.
        This is not supported via Ludus due to potential edge cases in naming
        depending on how the collection was installed.
      operationId: InstallCollection
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >
            pass an optional userID to install for.

            Defaults to the user's range (admins can interact with other users'
            ranges)
          required: false
          schema:
            properties:
              userID:
                $ref: '#/components/schemas/userID'
            x-apidog-orders:
              - userID
            type: object
      requestBody:
        content:
          application/json:
            schema:
              properties:
                collection:
                  type: string
                  examples:
                    - maxhoesel.smallstep
                version:
                  type: string
                  examples:
                    - 0.23.1
                force:
                  type: boolean
                  examples:
                    - true
              x-apidog-orders:
                - collection
                - version
                - force
              type: object
              x-apidog-ignore-properties: []
      responses:
        '201':
          description: collection installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    examples:
                      - 'Successfully installed: maxhoesel.smallstep'
                x-apidog-orders:
                  - result
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Created
        '409':
          description: Collection already installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - >-
                        Collection already installed. Collections from
                        https://docs.ansible.com/ansible/latest/collections/index.html
                        are installed globally. If you want to reinstall it,
                        consider using `--force`.
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Conflict
        '500':
          description: Error installing collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - >-
                        Unable to install the ansible collection:
                        maxhoesel.smallstep
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Internal Server Error
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Ansible Management
      x-apidog-status: released
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24251970-run
  /whoami:
    get:
      summary: whoami
      deprecated: false
      description: >-
        Get the full JSON output of the user and range that will be used for the
        request based on the query parameters
      operationId: whoami
      tags: []
      parameters:
        - name: userID
          in: query
          description: The userID to impersonate for this request (Admins only)
          required: false
          schema:
            type: string
        - name: rangeID
          in: query
          description: The rangeID to use for this request
          required: false
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      avatar:
                        type: string
                      collectionId:
                        type: string
                      collectionName:
                        type: string
                      created:
                        type: string
                      defaultRangeID:
                        type: string
                      emailVisibility:
                        type: boolean
                      expand:
                        type: object
                        properties:
                          ranges:
                            type: array
