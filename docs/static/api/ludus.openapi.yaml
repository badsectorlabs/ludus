openapi: 3.0.1
info:
  title: Ludus API
  description: >-
    This API controls Ludus user management, range deployment, power state, and
    testing state.
  version: 2.0.0
  license:
    name: GNU AGPLv3
    url: https://www.gnu.org/licenses/agpl-3.0.txt/
  contact:
    name: Ludus Discord
    url: https://discord.gg/HryzhdUSYT
tags:
  - name: Host Management
  - name: Ansible Management
  - name: User Management
  - name: Range Management
  - name: Power State Management
  - name: Testing State Management
  - name: Anti-Sandbox Management
  - name: Template Management
  - name: Snapshot Management
  - name: KMS Management
  - name: Group Management
  - name: Quota Management
  - name: Migration
  - name: Blueprint Management
paths:
  /:
    get:
      summary: Retrieve the ludus version
      deprecated: false
      description: |
        Returns the ludus version
      operationId: index
      tags:
        - Host Management
      parameters: []
      responses:
        '200':
          description: index
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: Ludus Version 2.0.0+abc1234
                  version:
                    type: string
                    pattern: \d+\.\d+.\d+
                required:
                  - version
              example:
                result: Ludus Server 2.0.0+abc123a
                version: 2.0.0
          headers: {}
        '401':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /license:
    get:
      summary: Retrieve the ludus license
      deprecated: false
      description: |
        Returns the ludus license
      operationId: getLicense
      tags:
        - Host Management
      parameters: []
      responses:
        '200':
          description: License Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseDataObject'
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /diagnostics:
    get:
      summary: Diagnostics
      deprecated: false
      description: >-
        Get system information that can be helpful for debugging issues with
        Ludus.
      operationId: diagnostics
      tags: []
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu:
                    type: object
                    properties:
                      cores:
                        type: integer
                      model:
                        type: string
                  storage_pools:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        type:
                          type: string
                        size:
                          type: integer
                        free:
                          type: integer
                        disk_type:
                          type: string
              example:
                cpu:
                  cores: 16
                  model: AMD Ryzen 7 8845HS w/ Radeon 780M Graphics
                storage_pools:
                  - name: ''
                    type: dir
                    size: 1966606663680
                    free: 376010477568
                    disk_type: unknown
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible/subscription-roles:
    get:
      summary: Retrieve available subscription roles
      deprecated: false
      description: An endpoint to return the avilable roles available to subscribers
      tags: []
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    role:
                      type: string
                    file_count:
                      type: integer
                    last_modified:
                      type: string
                    last_modified_unix:
                      type: string
                    version:
                      type: string
                    description:
                      type: string
                    package_uuid:
                      type: string
                    entitlements:
                      type: string
                  required:
                    - role
                    - file_count
                    - last_modified
                    - last_modified_unix
                    - version
                    - description
                    - package_uuid
                    - entitlements
              example:
                - role: ludus_ad_groups
                  file_count: 6
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    An Ansible Role that creates a group in AD and populates it
                    with the specified users
                  package_uuid: 128171ed-dbc0-4922-a8ca-6aac1d78e284
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_bulk_ad_content
                  file_count: 16
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    An Ansible Role that creates OUs, Users, and Groups on a
                    domain controller from CSV files
                  package_uuid: 8e2db32c-3d86-43a6-bb18-b988c19d146a
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_chronicle_exporter
                  file_count: 16
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    An Ansible Role that installs and configures Google SecOps
                    (Chronicle) collection agent on Windows hosts
                  package_uuid: b6c820d8-db92-401f-99f9-6675d71068f4
                  entitlements: ENTERPRISE_ROLES
                - role: ludus_ghosts_client
                  file_count: 13
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    Install GHOSTS client on Windows or Linux machines and
                    connect to the GHOSTS server
                  package_uuid: 644188ee-88d6-47b2-bbe2-be08a6eb26bc
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_guacamole_client
                  file_count: 13
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.5
                  description: >-
                    Ansible role to add windows/linux clients to Apache
                    Guacamole
                  package_uuid: fc4a5f0e-59e1-4c29-a7bc-37f831c66a41
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_guacamole_server
                  file_count: 16
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.3
                  description: Ansible role to deploy Apache Guacamole with Docker
                  package_uuid: ff87c4ce-6491-4b5d-979f-543d78382e08
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_local_users_and_groups
                  file_count: 8
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    An Ansible Role that adds local users and groups to a
                    machine
                  package_uuid: 4dc48455-93ff-4e87-8357-e537831fec6d
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_MDE
                  file_count: 14
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.1
                  description: >-
                    An Ansible Role that installs Microsoft Defender for
                    Endpoint on Windows hosts
                  package_uuid: 0f26a5ca-548e-4a95-9a96-1d6c834036ae
                  entitlements: ENTERPRISE_ROLES
                - role: ludus_mythic
                  file_count: 15
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    An Ansible Role that installs the Mythic C2 Framework on
                    Debian 12 (Bookworm)
                  package_uuid: a98a2892-0755-4366-85b0-5e4c39ddafeb
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_random_files
                  file_count: 6
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    Drop random files on the desktop and downloads folder of a
                    Windows machine
                  package_uuid: 6c4acae0-632c-4846-aca5-707d9df9ce28
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_set_wallpaper
                  file_count: 8
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: Set the wallpaper on Windows to a supplied image
                  package_uuid: 1311b048-fa10-4f80-aa34-e8240816c340
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_smb_share
                  file_count: 10
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.1
                  description: >-
                    An Ansible Role that sets up an SMB share on Windows 8 /
                    Windows 2012 or newer and optionally mounts the share on
                    clients
                  package_uuid: f81b0649-23b5-4f7c-98a9-134df39c5e4e
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_sysmon
                  file_count: 13
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.2
                  description: Install Sysmon on Windows and Linux. Rulesets included.
                  package_uuid: 941a398d-e848-4b0a-8aed-4827d640d8af
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_unconstrained_delegation
                  file_count: 6
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    An Ansible Role that configures unconstrained delegation for
                    a computer object in AD
                  package_uuid: c0ea4fa1-f53a-4111-bc18-5389ca7516b3
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_velociraptor
                  file_count: 27
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.2
                  description: >-
                    Install and configure the DFIR tool Velociraptor. Use
                    velociraptor_client and velociraptor_server variables to
                    install the client or server. Clients will automatically
                    connect to the server.
                  package_uuid: c2b36dc5-8fc5-4b5e-b397-b0197cb6fc93
                  entitlements: ENTERPRISE_ROLES
                - role: ludus_windows_configurator
                  file_count: 9
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: Configure various windows settings
                  package_uuid: 96607542-44c7-452c-ae9e-6579e7207a62
                  entitlements: PRO_ROLES,ENTERPRISE_ROLES
                - role: ludus_zeek_logging
                  file_count: 14
                  last_modified: Wed Dec 17 19:34:19 2025 -0500
                  last_modified_unix: '1766018059'
                  version: 1.0.0
                  description: >-
                    Install and configure Zeek on Debian 12 using official
                    packages
                  package_uuid: 3c7dd717-ba01-4dc1-b1d9-08fca383a4de
                  entitlements: ENTERPRISE_ROLES
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
    post:
      summary: Install subscription roles
      deprecated: false
      description: >-
        Install one or more subscription roles. Requires a valid Ludus license
        key to be set on the server
      tags: []
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roles:
                  type: array
                  items:
                    type: string
                    description: Role names
                global:
                  type: boolean
                force:
                  type: boolean
              required:
                - roles
                - global
                - force
            example:
              roles:
                - ludus_velociraptor
                - ludus_guacamole_client
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                        reason:
                          type: string
                required:
                  - success
                  - errors
              example:
                success:
                  - ludus_velociraptor
                errors:
                  - role: ludus_guacamole_client
                    reason: Failed to get role from server
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible/role/vars:
    post:
      summary: Get role variables for one or more Ansible roles
      deprecated: false
      description: >
        Returns the configurable variables (from defaults/main.yml) for one or
        more Ansible roles.

        These are the variables that can be set via role_vars in the range
        configuration.

        If a role is not found, an empty vars object is returned.
      operationId: GetRoleVars
      tags:
        - Ansible Management
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                roles:
                  type: array
                  items:
                    type: string
                  example:
                    - geerlingguy.docker
                    - lae.proxmox
              required:
                - roles
      responses:
        '200':
          description: Role variables retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: geerlingguy.docker
                        global:
                          type: boolean
                          example: false
                        vars:
                          type: object
                          additionalProperties: true
                          properties: {}
              example:
                roles:
                  - name: geerlingguy.docker
                    global: false
                    vars:
                      docker_package: docker-ce
                      docker_package_state: present
                  - name: nonexistent.role
                    vars: {}
          headers: {}
        '400':
          description: Bad request - at least one role name is required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: At least one role name is required
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible:
    get:
      summary: Retrieve available Ansible roles and collections
      deprecated: false
      description: |
        Returns available Ansible roles installed for this
        user on the ludus host
      operationId: getRolesAndCollections
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >-
            pass an optional userID to get roles and collections for a specific
            user
          required: false
          schema:
            $ref: '#/components/schemas/userID'
      responses:
        '200':
          description: Available roles and collections
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: geerlingguy.java
                    version:
                      type: string
                      example: 2.3.2
                    type:
                      type: string
                      example: role
                    global:
                      type: boolean
                      example: false
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible/role/scope:
    patch:
      summary: Move or copy roles between global and local scopes
      deprecated: false
      description: >
        Move or copy one or more Ansible roles between global (all users) and
        local (current user) installation scopes.

        Only administrators can use this endpoint.
      operationId: MoveRoleScope
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: The userID to impersonate for this request (Admins only)
          required: false
          example: JD
          schema:
            type: string
            pattern: ^[A-Za-z0-9]{1,20}$
      requestBody:
        content:
          application/json:
            schema:
              properties:
                roles:
                  type: array
                  items:
                    type: string
                  example:
                    - geerlingguy.java
                    - geerlingguy.docker
                global:
                  type: boolean
                  description: Target scope - true for global, false for local
                  example: true
                copy:
                  type: boolean
                  description: >-
                    If true, copy the role (keep source). If false, move the
                    role (remove source).
                  example: false
              required:
                - roles
                - global
              type: object
            examples: {}
      responses:
        '200':
          description: roles processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: array
                    items:
                      type: string
                    example:
                      - geerlingguy.java
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                        error:
                          type: string
          headers: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: At least one role name is required
          headers: {}
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Only administrators can move roles between scopes
          headers: {}
        '500':
          description: Error moving/copying role
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal server error
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible/role:
    post:
      summary: Install or Remove an Ansible role
      deprecated: false
      description: |
        Install or Remove an ansible role by name or URL.
        Admins can pass a userID parameter to install a role for other users
        Action can be either "install or "remove".
      operationId: InstallRole
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >
            pass an optional userID to install for.

            Defaults to the user's range (admins can interact with other users'
            ranges)
          required: false
          schema:
            $ref: '#/components/schemas/userID'
      requestBody:
        content:
          application/json:
            schema:
              properties:
                role:
                  type: string
                  example: geerlingguy.java
                version:
                  type: string
                  example: 2.3.2
                force:
                  type: boolean
                  example: true
                action:
                  type: string
                  example: install
                global:
                  type: boolean
                  example: false
              type: object
            examples: {}
      responses:
        '201':
          description: role installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: 'Successfully installed: geerlingguy.java'
          headers: {}
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: You are not authorized to perform this ansible action
          headers: {}
        '500':
          description: Error installing role
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Unable to install the ansible role: geerlingguy.java'
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible/role/fromtar:
    put:
      summary: Install an Ansible role from local directory
      deprecated: false
      description: |
        Install an ansible role from a local directory.
        Admins can pass a userID parameter to install a role for other users.
      operationId: InstallRoleTar
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >
            pass an optional userID to install for.

            Defaults to the user's range (admins can interact with other users'
            ranges)
          required: false
          schema:
            $ref: '#/components/schemas/userID'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  example: ''
                force:
                  type: boolean
                  example: false
            examples: {}
      responses:
        '201':
          description: role installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: Successfully installed role
          headers: {}
        '400':
          description: Error installing role - bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid boolean value
          headers: {}
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: You are not authorized to perform this ansible action
          headers: {}
        '500':
          description: Error installing role - server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'Unable to install the ansible role: <error>'
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /ansible/collection:
    post:
      summary: Install an Ansible collection
      deprecated: false
      description: >
        Install an ansible collection by name or URL.

        Admins can pass a userID parameter to install a collection for other
        users.

        Ansible collections can only be removed by rm-ing their directories.
        This is not supported via Ludus due to potential edge cases in naming
        depending on how the collection was installed.
      operationId: InstallCollection
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >
            pass an optional userID to install for.

            Defaults to the user's range (admins can interact with other users'
            ranges)
          required: false
          schema:
            $ref: '#/components/schemas/userID'
      requestBody:
        content:
          application/json:
            schema:
              properties:
                collection:
                  type: string
                  example: maxhoesel.smallstep
                version:
                  type: string
                  example: 0.23.1
                force:
                  type: boolean
                  example: true
              type: object
            examples: {}
      responses:
        '201':
          description: collection installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: 'Successfully installed: maxhoesel.smallstep'
          headers: {}
        '409':
          description: Collection already installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: >-
                      Collection already installed. Collections from
                      https://docs.ansible.com/ansible/latest/collections/index.html
                      are installed globally. If you want to reinstall it,
                      consider using `--force`.
          headers: {}
        '500':
          description: Error installing collection
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: >-
                      Unable to install the ansible collection:
                      maxhoesel.smallstep
          headers: {}
      security:
        - JWT: []
        - ApiKeyAuth: []
  /whoami:
    get:
      summary: whoami
      deprecated: false
      description: >-
        Get the full JSON output of the user and range that will be used for the
        request based on the query parameters
      operationId: whoami
      tags: []
      parameters:
        - name: userID
          in: query
          description: The userID to impersonate for this request (Admins only)
          required: false
          schema:
            type: string
        - name: rangeID
          in: query
          description: The rangeID to use for this request
          required: false
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      avatar:
                        type: string
                      collectionId:
                        type: string
                      collectionName:
                        type: string
                      created:
                        type: string
                      defaultRangeID:
                        type: string
                      emailVisibility:
                        type: boolean
                      expand:
                        type: object
                        properties:
                          ranges:
                            type: array
                            items:
                              type: object
                              properties:
                                allowedDomains:
                                  type: 'null'
                                allowedIPs:
                                  type: 'null'
                                collectionId:
                                  type: string
                                collectionName:
                                  type: string
                                created:
