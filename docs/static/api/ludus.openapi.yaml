      deprecated: false
      description: >
        Adds a user to the system. This action is only available to admins.

        Note: this response will contain the plaintext API key for the user.

        It will not be available again except by resetting it using the
        /user/apikey endpoint.
      operationId: addUser
      tags:
        - User Management
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - userID
                - isAdmin
                - email
              properties:
                name:
                  type: string
                  example: John Doe
                userID:
                  $ref: '#/components/schemas/userID'
                isAdmin:
                  type: boolean
                  example: true
                password:
                  type: string
                  example: super-secret-password
                email:
                  type: string
                  example: john.doe@example.com
            examples: {}
      responses:
        '201':
          description: user created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/UserObject'
                  - type: object
                    properties:
                      apiKey:
                        type: string
                        example: JD.Vf{M@GC:w}YQ=1zv@gLLnDH:j3nI]l7@:ct:qPy9
                  - type: object
                    properties:
                      proxmoxUsername:
                        type: string
