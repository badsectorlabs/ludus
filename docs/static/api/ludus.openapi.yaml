    rangeID:
      type: string
      pattern: ^[A-Za-z0-9_\-]+(\/[A-Za-z0-9_\-]+){0,2}$
      description: >
        Must be a valid proxmox pool name (e.g. 'DEMO', 'my-range' or
        'New_Range'). Use only letters, numbers, hyphens, and underscores.

        This is the rangeID, which is used to identify the range.
      examples:
        - DEMO
      x-apidog-folder: ''
    UserObject:
      type: object
      required:
        - name
        - userID
        - isAdmin
      properties:
        name:
          type: string
          examples:
            - John Doe
        userID:
          $ref: '#/components/schemas/userID'
        dateCreated:
          type: string
          format: date-time
          readOnly: true
          examples:
            - '2022-08-29T09:12:33.001Z'
        dateLastActive:
          type: string
          format: date-time
          readOnly: true
          examples:
            - '2022-08-29T09:12:33.001Z'
        isAdmin:
          type: boolean
          examples:
            - true
        proxmoxUsername:
          type: string
          readOnly: true
          examples:
            - john-doe
      x-apidog-orders:
        - name
        - userID
        - dateCreated
        - dateLastActive
        - isAdmin
        - proxmoxUsername
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    UserAPIKeyObject:
      type: object
      properties:
        apiKey:
          type: string
          pattern: ^[a-zA-Z0-9!@#%^&*()_+\-=\[\]{}:\\|<>\/?]{40}$
          readOnly: true
          examples:
            - G0rO+G+8Zlu%CAEDyYC2ZdW3pBWW+alAJ2_tli1h
      x-apidog-orders:
        - apiKey
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    UserCredentialObject:
      properties:
        proxmoxUsername:
          readOnly: true
          type: string
          examples:
            - john-doe
        proxmoxPassword:
          readOnly: true
          type: string
          examples:
            - 5cy5@plhik4g&Yk12sG
        ludusEmail:
          readOnly: true
          type: string
          examples:
            - john.doe@example.com
        proxmoxRealm:
          readOnly: true
          type: string
          examples:
            - pam
      type: object
      x-apidog-orders:
        - proxmoxUsername
        - proxmoxPassword
        - ludusEmail
        - proxmoxRealm
      examples:
        - ludusEmail: john.doe@example.com
          proxmoxPassword: 5cy5@plhik4g&Yk12sG
          proxmoxUsername: john-doe
          proxmoxRealm: pam
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    RangeObject:
      type: object
      required:
        - rangeID
        - rangeNumber
        - lastDeployment
        - numberOfVMs
        - testingEnabled
        - VMs
      properties:
        rangeID:
          $ref: '#/components/schemas/userID'
        rangeNumber:
          type: integer
          format: int32
          readOnly: true
          examples:
            - 3
        name:
          type: string
          examples:
            - Red Team Range
        description:
          type: string
          examples:
            - Range for red team
        purpose:
          type: string
          examples:
            - Testing
        thumbnailUrl:
          type: string
          readOnly: true
          examples:
            - /api/files/ranges/4l9n0t9ed3sxq8n/thumbnail.png
        lastDeployment:
          type: string
          format: date-time
          readOnly: true
          examples:
            - '2022-08-29T09:12:33.001Z'
        numberOfVMs:
          type: integer
          format: int32
          readOnly: true
          examples:
            - 7
        testingEnabled:
          type: boolean
          readOnly: true
          examples:
            - true
        allowedIPs:
          type: array
          items:
            type: string
            examples:
              - 1.2.3.4
        allowedDomains:
          type: array
          items:
            type: string
            examples:
              - example.com
        rangeState:
          type: string
          examples:
            - SUCCESS
        VMs:
          type: array
          items:
            $ref: '#/components/schemas/VMObject'
      x-apidog-orders:
        - rangeID
        - rangeNumber
        - name
        - description
        - purpose
        - thumbnailUrl
        - lastDeployment
        - numberOfVMs
        - testingEnabled
        - allowedIPs
        - allowedDomains
        - rangeState
        - VMs
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    VMObject:
      type: object
      required:
        - ID
        - proxmoxID
        - rangeNumber
        - name
        - poweredOn
      properties:
        ID:
          type: integer
          format: int32
          readOnly: true
          examples:
            - 53
        proxmoxID:
          type: integer
          format: int32
          readOnly: true
          examples:
            - 146
        rangeNumber:
          type: integer
          format: int32
          readOnly: true
          examples:
            - 3
        name:
          type: string
          examples:
            - JD-ad-dc-win2019-server-x64
        poweredOn:
          type: boolean
          examples:
            - true
        ip:
          $ref: '#/components/schemas/IP'
        isRouter:
          type: boolean
          description: Indicates whether this VM is the router for the range
          examples:
            - false
      x-apidog-orders:
        - ID
        - proxmoxID
        - rangeNumber
        - name
        - poweredOn
        - ip
        - isRouter
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    Domain:
      type: string
      pattern: >-
        ^(?!.*?_.*?)(?!(?:[\d\w]+?\.)?\-[\w\d\.\-]*?)(?![\w\d]+?\-\.(?:[\d\w\.\-]+?))(?=[\w\d])(?=[\w\d\.\-]*?\.+[\w\d\.\-]*?)(?![\w\d\.\-]{254})(?!(?:\.?[\w\d\-\.]*?[\w\d\-]{64,}\.)+?)[\w\d\.\-]+?(?<![\w\d\-\.]*?\.[\d]+?)(?<=[\w\d\-]{2,})(?<![\w\d\-]{25})$
      description: A domain to allow during testing (along with HTTPS CRL domains)
      examples:
        - example.com
      x-apidog-folder: ''
    IP:
      type: string
      pattern: >-
        ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
      examples:
        - 203.0.113.4
      x-apidog-folder: ''
    AllowPayload:
      type: object
      properties:
        domains:
          type: array
          items:
            $ref: '#/components/schemas/Domain'
        ips:
          type: array
          items:
            $ref: '#/components/schemas/IP'
      x-apidog-orders:
        - domains
        - ips
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    SnapshotInfo:
      type: object
      properties:
        name:
          type: string
          description: Snapshot identifier. Value 'current' identifies the current VM
          examples:
            - My snapshot
        includesRAM:
          type: boolean
          description: 1 if the snapshot includes RAM, 0 if it does not
          examples:
            - true
        description:
          type: string
          description: Description of the snapshot
          examples:
            - Took this snapshot before testing something
        snaptime:
          type: integer
          format: uint
          description: Snapshot creation time (unix)
          examples:
            - 1740779020
        parent:
          type: string
          description: Parent snapshot identifier
          examples:
            - Other snapshot
        vmid:
          type: integer
          format: int32
          description: The VMID of the VM
          examples:
            - 179
        vmname:
          type: string
          description: The name of the VM
          examples:
            - JD-ad-win11-22h2-enterprise-x64-1
      x-apidog-orders:
        - name
        - includesRAM
        - description
        - snaptime
        - parent
        - vmid
        - vmname
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    ErrorInfo:
      type: object
      properties:
        vmid:
          type: integer
          format: int32
          description: The VMID of the VM
          examples:
            - 180
        vmname:
          type: string
          description: The name of the VM
          examples:
            - JD-ad-win11-22h2-enterprise-x64-2
        error:
          type: string
          description: Error message
          examples:
            - >-
              Error parsing VM ID abc: strconv.Atoi: parsing "abc": invalid
              syntax
      x-apidog-orders:
        - vmid
        - vmname
        - error
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    SnapshotCreatePayload:
      type: object
      properties:
        name:
          type: string
          description: Snapshot name
          examples:
            - My cool snapshot
        description:
          type: string
          description: Snapshot Description
          examples:
            - Taking this snapshot before doing some testing
        vmids:
          type: array
          items:
            type: integer
            format: int32
          description: >-
            Array of VMIDs to snapshot, if blank all VMs in the range will be
            snapshotted
          examples:
            - - 179
              - 180
        includeRAM:
          type: boolean
          description: >-
            Include RAM in the snapshot. If false, the VM will be powered off
            when restored to this snapshot.
          examples:
            - true
      x-apidog-orders:
        - name
        - description
        - vmids
        - includeRAM
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
    LicenseDataObject:
      type: object
      properties:
        edition:
          type: string
          description: The type of license the Ludus server is using
          enum:
            - enterprise
            - professional
            - community
          examples:
            - enterprise
        licensed_to:
          type: string
          description: The name of the person or organization the license is licensed to
          examples:
            - John Doe
        expires_at:
          type: string
          format: date-time
          description: The date and time the license expires
          examples:
            - '2022-08-29T09:12:33.001Z'
        active:
          type: boolean
          description: Whether the license is active
          examples:
            - true
        message:
          type: string
          description: The message associated with the license
          examples:
            - 'License active, expires: 2022-08-29 14:12:33, licensed to John Doe'
      x-apidog-orders:
        - edition
        - licensed_to
        - expires_at
        - active
        - message
      x-apidog-ignore-properties: []
      x-apidog-folder: ''
