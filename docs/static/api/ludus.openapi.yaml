  /user/quotas:
    get:
      summary: Get quota status for the current user
      deprecated: false
      description: |
        Returns the effective quota limits and current resource usage for the authenticated user.
        Limits are resolved using the priority chain: user quota > group default > system default > unlimited (0).
      operationId: getQuotaStatus
      tags:
        - Quota Management
      parameters:
        - name: userID
          in: query
          description: pass an optional userID to view quotas for a specific user (admin only)
          required: false
          schema:
            $ref: '#/components/schemas/userID'
      responses:
        '200':
          description: quota status
          content:
            application/json:
              schema:
                type: object
                properties:
                  limitRAM:
                    type: integer
                    description: Effective RAM limit in GB (0 = unlimited)
                    example: 64
                  limitCPU:
                    type: integer
                    description: Effective CPU core limit (0 = unlimited)
                    example: 16
                  limitVMs:
                    type: integer
                    description: Effective VM count limit (0 = unlimited)
                    example: 10
                  limitRanges:
                    type: integer
                    description: Effective range count limit (0 = unlimited)
                    example: 3
                  usedRAM:
                    type: integer
                    description: Current RAM usage in GB
                    example: 24
                  usedCPU:
                    type: integer
                    description: Current CPU core usage
                    example: 12
                  usedVMs:
                    type: integer
                    description: Current VM count
                    example: 5
                  usedRanges:
                    type: integer
                    description: Current range count
                    example: 2
      security:
        - JWT: []
        - ApiKeyAuth: []
    put:
      summary: Set quotas for one or more users (admin only)
      deprecated: false
      description: |
        Set resource quota limits for one or more users. Only provided fields are updated.
        Set a value to 0 to remove a limit. Negative values are rejected.
        Supports bulk operations via the userIDs array.
      operationId: setUserQuota
      tags:
        - Quota Management
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - userIDs
              properties:
                userIDs:
                  type: array
                  items:
                    type: string
                  description: One or more userIDs to set quotas for
                  example: ["JD", "AB"]
                quotaRAM:
                  type: integer
                  description: RAM limit in GB (0 = remove limit)
                  example: 64
                quotaCPU:
                  type: integer
                  description: CPU core limit (0 = remove limit)
                  example: 16
                quotaVMs:
                  type: integer
                  description: VM count limit (0 = remove limit)
                  example: 10
                quotaRanges:
                  type: integer
                  description: Range count limit (0 = remove limit)
                  example: 3
      responses:
        '200':
          description: quotas updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: "Quotas updated for 2 user(s)"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "quota values must be >= 0"
        '403':
          description: Unauthorized - not an admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: You are not an admin and cannot set user quotas
      security:
        - JWT: []
        - ApiKeyAuth: []
