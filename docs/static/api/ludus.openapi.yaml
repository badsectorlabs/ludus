components:
  schemas:
    ErrorInfo:
      type: object
      properties:
        vmid:
          type: integer
          format: int32
          description: The VMID of the VM
          example: 180
        vmname:
          type: string
          description: The name of the VM
          example: JD-ad-win11-22h2-enterprise-x64-2
        error:
          type: string
          description: Error message
          example: 'Error parsing VM ID abc: strconv.Atoi: parsing "abc": invalid syntax'
    SnapshotCreatePayload:
      type: object
      properties:
        name:
          type: string
          description: Snapshot name
          example: My cool snapshot
        description:
          type: string
          description: Snapshot Description
          example: Taking this snapshot before doing some testing
        vmids:
          type: array
          items:
            type: integer
            format: int32
          description: >-
            Array of VMIDs to snapshot, if blank all VMs in the range will be
            snapshotted
          example:
            - 179
            - 180
        includeRAM:
          type: boolean
          description: >-
            Include RAM in the snapshot. If false, the VM will be powered off
            when restored to this snapshot.
          example: true
    LicenseDataObject:
      type: object
      properties:
        entitlements:
          type: array
          items:
            type: string
            description: Individual entitlement code
          description: The entitlements granted by the license
          example: ENTERPRISE_PLUGIN
        licensed_to:
          type: string
          description: The name of the person or organization the license is licensed to
          example: John Doe
        expires_at:
          type: string
          format: date-time
          description: The date and time the license expires
          example: '2022-08-29T09:12:33.001Z'
        active:
          type: boolean
          description: Whether the license is active
          example: true
        message:
          type: string
          description: The message associated with the license
          example: 'License active, expires: 2022-08-29 14:12:33, licensed to John Doe'
    LogHistoryEntry:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the log history entry
          example: abc123def456
        status:
          type: string
          description: The final status of the operation
          enum:
            - success
            - failure
          example: success
        start:
          type: string
          format: date-time
          description: When the operation started
          example: '2024-01-15T10:30:00.000Z'
        end:
          type: string
          format: date-time
          description: When the operation completed
          example: '2024-01-15T10:45:00.000Z'
        created:
          type: string
          format: date-time
          description: When the log history entry was created
          example: '2024-01-15T10:45:01.000Z'
        template:
          type: string
          description: The template this log relates to
          example: debian-12-x64-server-template
    LogHistoryDetailResponse:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the log history entry
          example: abc123def456
        status:
          type: string
          description: The final status of the operation
          enum:
            - success
            - failure
          example: success
        start:
          type: string
          format: date-time
          description: When the operation started
          example: '2024-01-15T10:30:00.000Z'
        end:
          type: string
          format: date-time
          description: When the operation completed
          example: '2024-01-15T10:45:00.000Z'
        created:
          type: string
          format: date-time
          description: When the log history entry was created
          example: '2024-01-15T10:45:01.000Z'
        result:
          type: string
          description: The full log content
          example: >
            2024-01-15 10:30:00,810 p=2034571 u=john-doe n=ansible | PLAY
            [Deploy test range] *****
    RangeObject:
      type: object
      required:
        - rangeID
        - rangeNumber
        - lastDeployment
        - numberOfVMs
        - testingEnabled
        - VMs
      properties:
        rangeID:
          $ref: '#/components/schemas/userID'
        rangeNumber:
          type: integer
          format: int32
          readOnly: true
          example: 3
        name:
          type: string
          example: Red Team Range
        description:
          type: string
          example: Range for red team
        purpose:
          type: string
          example: Testing
        lastDeployment:
          type: string
          format: date-time
          readOnly: true
          example: '2022-08-29T09:12:33.001Z'
        numberOfVMs:
          type: integer
          format: int32
          readOnly: true
          example: 7
        testingEnabled:
          type: boolean
          readOnly: true
          example: true
        allowedIPs:
          type: array
          items:
            type: string
            example: 1.2.3.4
        allowedDomains:
          type: array
          items:
            type: string
            example: example.com
        rangeState:
          type: string
          example: SUCCESS
        VMs:
          type: array
          items:
            $ref: '#/components/schemas/VMObject'
    userID:
      type: string
      pattern: ^[A-Za-z0-9]{1,20}$
      description: |
        Must be a unique 1-20 character alpha-numeric string.
        Initials are commonly used.
      example: JD
    rangeID:
      type: string
      pattern: ^[A-Za-z0-9_\-]+(\/[A-Za-z0-9_\-]+){0,2}$
      description: >
        Must be a valid proxmox pool name (e.g. 'DEMO', 'my-range' or
        'New_Range'). Use only letters, numbers, hyphens, and underscores.

        This is the rangeID, which is used to identify the range.
      example: DEMO
    UserObject:
      type: object
      required:
        - name
        - userID
        - isAdmin
      properties:
        name:
          type: string
          example: John Doe
        userID:
          $ref: '#/components/schemas/userID'
        dateCreated:
          type: string
          format: date-time
          readOnly: true
          example: '2022-08-29T09:12:33.001Z'
        dateLastActive:
          type: string
          format: date-time
          readOnly: true
          example: '2022-08-29T09:12:33.001Z'
        isAdmin:
          type: boolean
          example: true
        proxmoxUsername:
          type: string
          readOnly: true
          example: john-doe
    UserCredentialObject:
      properties:
        proxmoxUsername:
          readOnly: true
          type: string
          example: john-doe
        proxmoxPassword:
          readOnly: true
          type: string
          example: 5cy5@plhik4g&Yk12sG
        ludusEmail:
          readOnly: true
          type: string
          example: john.doe@example.com
        proxmoxRealm:
          readOnly: true
          type: string
          example: pam
      type: object
      example:
        ludusEmail: john.doe@example.com
        proxmoxPassword: 5cy5@plhik4g&Yk12sG
        proxmoxUsername: john-doe
        proxmoxRealm: pam
    VMObject:
      type: object
      required:
        - ID
        - proxmoxID
        - rangeNumber
        - name
        - poweredOn
        - cpu
        - ram
      properties:
        ID:
          type: integer
          format: int32
          readOnly: true
          example: 53
        proxmoxID:
          type: integer
          format: int32
          readOnly: true
          example: 146
        rangeNumber:
          type: integer
          format: int32
          readOnly: true
          example: 3
        name:
          type: string
          example: JD-ad-dc-win2019-server-x64
        poweredOn:
          type: boolean
          example: true
        ip:
          type: string
        isRouter:
          type: boolean
          description: Indicates whether this VM is the router for the range
          example: false
        cpu:
          type: integer
          format: int32
          description: Number of CPU cores allocated to the VM
          example: 4
        ram:
          type: integer
          format: int32
          description: Amount of RAM allocated to the VM in GB
          example: 8
    Domain:
      type: string
      pattern: >-
        ^(?!.*?_.*?)(?!(?:[\d\w]+?\.)?\-[\w\d\.\-]*?)(?![\w\d]+?\-\.(?:[\d\w\.\-]+?))(?=[\w\d])(?=[\w\d\.\-]*?\.+[\w\d\.\-]*?)(?![\w\d\.\-]{254})(?!(?:\.?[\w\d\-\.]*?[\w\d\-]{64,}\.)+?)[\w\d\.\-]+?(?<![\w\d\-\.]*?\.[\d]+?)(?<=[\w\d\-]{2,})(?<![\w\d\-]{25})$
      description: A domain to allow during testing (along with HTTPS CRL domains)
      example: example.com
    IP:
      type: string
      pattern: >-
        ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$
      example: 203.0.113.4
    AllowPayload:
      type: object
      properties:
        domains:
          type: array
          items:
            $ref: '#/components/schemas/Domain'
        ips:
          type: array
          items:
            $ref: '#/components/schemas/IP'
    SnapshotInfo:
      type: object
      properties:
        name:
          type: string
          description: Snapshot identifier. Value 'current' identifies the current VM
          example: My snapshot
        includesRAM:
          type: boolean
          description: 1 if the snapshot includes RAM, 0 if it does not
          example: true
        description:
          type: string
          description: Description of the snapshot
          example: Took this snapshot before testing something
        snaptime:
          type: integer
          format: uint
          description: Snapshot creation time (unix)
          example: 1740779020
        parent:
          type: string
          description: Parent snapshot identifier
          example: Other snapshot
        vmid:
          type: integer
          format: int32
          description: The VMID of the VM
          example: 179
        vmname:
          type: string
          description: The name of the VM
          example: JD-ad-win11-22h2-enterprise-x64-1
    UserAPIKeyObject:
      type: object
      properties:
        apiKey:
          type: string
          pattern: ^[a-zA-Z0-9!@#%^&*()_+\-=\[\]{}:\\|<>\/?]{40}$
          readOnly: true
          example: G0rO+G+8Zlu%CAEDyYC2ZdW3pBWW+alAJ2_tli1h
    UserMembershipObject:
      type: object
      required:
        - groupName
        - role
      properties:
        groupName:
          type: string
          description: The name of the group
          example: Security Team
        description:
          type: string
          description: Optional description of the group
          example: Security team members
        role:
          type: string
          description: The user's role in the group
          enum:
            - member
            - manager
          example: manager
    BulkAddUsersToGroupRequest:
      type: object
      required:
        - userIDs
      properties:
        userIDs:
          type: array
          items:
            type: string
          description: Array of user IDs to add to the group
          example:
            - user1
            - user2
            - user3
        managers:
          type: array
          items:
            type: string
          description: Optional array of user IDs that should be managers
          example:
            - user1
    BulkRemoveUsersFromGroupRequest:
      type: object
      required:
        - userIDs
      properties:
        userIDs:
          type: array
          items:
            type: string
          description: Array of user IDs to remove from the group
          example:
            - user1
            - user2
            - user3
    BulkAddRangesToGroupRequest:
      type: object
      required:
        - rangeIDs
      properties:
        rangeIDs:
          type: array
          items:
            type: string
          description: Array of range IDs to grant group access to
          example:
            - DEMO
            - TEST
            - PROD
    BulkRemoveRangesFromGroupRequest:
      type: object
      required:
        - rangeIDs
      properties:
        rangeIDs:
          type: array
          items:
            type: string
          description: Array of range IDs to revoke group access from
          example:
            - DEMO
            - TEST
            - PROD
    BulkGroupOperationResponse:
      type: object
      properties:
        success:
          type: array
          items:
            type: string
            example: user1
          description: Array of successfully processed items
        errors:
          type: array
          items:
            $ref: '#/components/schemas/BulkGroupOperationErrorItem'
          description: Array of errors for failed items
      example:
        success:
          - user1
          - user2
        errors:
          - item: user3
            reason: User not found
    BulkGroupOperationErrorItem:
      type: object
      required:
        - item
        - reason
      properties:
        item:
          type: string
          description: The item that failed (userID or rangeID)
        reason:
          type: string
          description: Reason for the failure
      example:
        item: user3
        reason: User not found
