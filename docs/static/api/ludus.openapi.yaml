              rangeID:
                $ref: '#/components/schemas/rangeID'
            x-apidog-orders:
              - rangeID
            type: object
        - name: userID
          in: query
          description: |
            The userID to deploy range for.
            Defaults to the current user (admins can deploy other users' ranges)
          required: false
          schema:
            properties:
              userID:
                $ref: '#/components/schemas/userID'
            x-apidog-orders:
              - userID
            type: object
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: string
                  description: 'the ansible tags to run for this deploy (default: all)'
                  examples:
                    - all
                force:
                  type: boolean
                  description: 'force the deployment if testing is enabled (default: false)'
                  examples:
                    - false
                only_roles:
                  type: array
                  items:
                    type: string
                    examples:
                      - badsectorlabs.ludus_bloodhound_ce
                  description: >-
                    limit the user defined roles to be run to this comma
