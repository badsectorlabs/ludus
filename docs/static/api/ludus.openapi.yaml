openapi: 3.1.0
info:
  title: Ludus API
  description: >-
    This API controls Ludus user management, range deployment, power state, and
    testing state.
  version: 2.0.0
  license:
    name: GNU AGPLv3
    url: https://www.gnu.org/licenses/agpl-3.0.txt/
  contact:
    name: Ludus Discord
    url: https://discord.gg/HryzhdUSYT
tags:
  - name: Host Management
  - name: Ansible Management
  - name: User Management
  - name: Range Management
  - name: Power State Management
  - name: Testing State Management
  - name: Anti-Sandbox Management
  - name: Template Management
  - name: Snapshot Management
  - name: KMS Management
  - name: Group Management
  - name: Migration
paths:
  /diagnostics:
    get:
      summary: Diagnostics
      deprecated: false
      description: >-
        Get system information that can be helpful for debugging issues with
        Ludus.
      operationId: diagnostics
      tags: []
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu:
                    type: object
                    properties:
                      cores:
                        type: integer
                        x-apidog-mock: '16'
                      model:
                        type: string
                        x-apidog-mock: AMD Ryzen 7 8845HS w/ Radeon 780M Graphics
                    x-apidog-orders:
                      - cores
                      - model
                    x-apidog-ignore-properties: []
                  storage_pools:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          x-apidog-mock: local
                        type:
                          type: string
                          x-apidog-mock: dir
                        size:
                          type: integer
                          x-apidog-mock: '1966606663680'
                        free:
                          type: integer
                          x-apidog-mock: '376010477568'
                        disk_type:
                          type: string
                          x-apidog-mock: nvme
                      x-apidog-orders:
                        - name
                        - type
                        - size
                        - free
                        - disk_type
                      x-apidog-ignore-properties: []
                x-apidog-orders:
                  - cpu
                  - storage_pools
                x-apidog-ignore-properties: []
              example:
                cpu:
                  cores: 16
                  model: AMD Ryzen 7 8845HS w/ Radeon 780M Graphics
                storage_pools:
                  - name: ''
                    type: dir
                    size: 1966606663680
                    free: 376010477568
                    disk_type: unknown
          headers: {}
          x-apidog-name: Success
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Host Management
      x-apidog-status: developing
      x-apidog-maintainer: Erik Hunstad
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24493298-run
  /:
    get:
      summary: Retrieve the ludus version
      deprecated: false
      description: |
        Returns the ludus version
      operationId: index
      tags:
        - Host Management
      parameters: []
      responses:
        '200':
          description: index
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    examples:
                      - Ludus Server v1.0.0+abc123a
                    x-apidog-mock: Ludus Server v1.0.0+abc123a
                x-apidog-orders:
                  - result
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: OK
        '401':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    x-apidog-mock: >-
                      Authentication failed. Provide a valid API key in the
                      X-API-KEY header or a valid JWT token in the Authorization
                      header.
                required:
                  - error
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Unauthenticated
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Host Management
      x-apidog-status: released
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24251965-run
  /license:
    get:
      summary: Retrieve the ludus license
      deprecated: false
      description: |
        Returns the ludus license
      operationId: getLicense
      tags:
        - Host Management
      parameters: []
      responses:
        '200':
          description: License Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LicenseDataObject'
          headers: {}
          x-apidog-name: OK
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Host Management
      x-apidog-status: released
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24251966-run
  /ansible:
    get:
      summary: Retrieve available Ansible roles and collections
      deprecated: false
      description: |
        Returns available Ansible roles installed for this
        user on the ludus host
      operationId: getRolesAndCollections
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >-
            pass an optional userID to get roles and collections for a specific
            user
          required: false
          schema:
            properties:
              userID:
                $ref: '#/components/schemas/userID'
            x-apidog-orders:
              - userID
            type: object
      responses:
        '200':
          description: Available roles and collections
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      examples:
                        - geerlingguy.java
                    version:
                      type: string
                      examples:
                        - 2.3.2
                    type:
                      type: string
                      examples:
                        - role
                    global:
                      type: boolean
                      examples:
                        - false
                  x-apidog-orders:
                    - name
                    - version
                    - type
                    - global
                  x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: OK
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Ansible Management
      x-apidog-status: released
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24251967-run
  /ansible/role:
    post:
      summary: Install or Remove an Ansible role
      deprecated: false
      description: |
        Install or Remove an ansible role by name or URL.
        Admins can pass a userID parameter to install a role for other users
        Action can be either "install or "remove".
      operationId: InstallRole
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >
            pass an optional userID to install for.

            Defaults to the user's range (admins can interact with other users'
            ranges)
          required: false
          schema:
            properties:
              userID:
                $ref: '#/components/schemas/userID'
            x-apidog-orders:
              - userID
            type: object
      requestBody:
        content:
          application/json:
            schema:
              properties:
                role:
                  type: string
                  examples:
                    - geerlingguy.java
                version:
                  type: string
                  examples:
                    - 2.3.2
                force:
                  type: boolean
                  examples:
                    - true
                action:
                  type: string
                  examples:
                    - install
                global:
                  type: boolean
                  examples:
                    - false
              x-apidog-orders:
                - role
                - version
                - force
                - action
                - global
              type: object
              x-apidog-ignore-properties: []
      responses:
        '201':
          description: role installed
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    examples:
                      - 'Successfully installed: geerlingguy.java'
                x-apidog-orders:
                  - result
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Created
        '403':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - You are not authorized to perform this ansible action
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Forbidden
        '500':
          description: Error installing role
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      - 'Unable to install the ansible role: geerlingguy.java'
                x-apidog-orders:
                  - error
                x-apidog-ignore-properties: []
          headers: {}
          x-apidog-name: Internal Server Error
      security:
        - JWT: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
        - ApiKeyAuth: []
          x-apidog:
            schemeGroups:
              - id: GsLxs9h7xv12TxRBN12L_
                schemeIds:
                  - JWT
              - id: XVEYlHAEiZeje6By6g1Mk
                schemeIds:
                  - ApiKeyAuth
            required: true
            use:
              id: XVEYlHAEiZeje6By6g1Mk
              configs:
                ApiKeyAuth:
                  authConfigs:
                    x-apidog:
                      value: '{{X-API-KEY}}'
            scopes: {}
      x-apidog-folder: Ansible Management
      x-apidog-status: released
      x-run-in-apidog: https://app.apidog.com/web/project/1126461/apis/api-24251968-run
  /ansible/role/fromtar:
    put:
      summary: Install an Ansible role from local directory
      deprecated: false
      description: |
        Install an ansible role from a local directory.
        Admins can pass a userID parameter to install a role for other users.
      operationId: InstallRoleTar
      tags:
        - Ansible Management
      parameters:
        - name: userID
          in: query
          description: >
            pass an optional userID to install for.

            Defaults to the user's range (admins can interact with other users'
