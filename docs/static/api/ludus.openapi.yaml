                                name:
                                  type: string
                                numberOfVMs:
                                  type: integer
                                purpose:
                                  type: string
                                rangeID:
                                  type: string
                                rangeNumber:
                                  type: integer
                                rangeState:
                                  type: string
                                testingEnabled:
                                  type: boolean
                                updated:
                                  type: string
                              x-apidog-orders:
                                - allowedDomains
                                - allowedIPs
                                - collectionId
                                - collectionName
                                - created
                                - description
                                - id
                                - lastDeployment
                                - name
                                - numberOfVMs
                                - purpose
                                - rangeID
                                - rangeNumber
                                - rangeState
                                - testingEnabled
                                - updated
                              x-apidog-ignore-properties: []
                        required:
                          - ranges
                        x-apidog-orders:
                          - ranges
                        x-apidog-ignore-properties: []
                      groups:
                        type: array
                        items:
                          type: string
                      id:
                        type: string
                      isAdmin:
                        type: boolean
                      lastActive:
                        type: string
                      name:
                        type: string
                      proxmoxRealm:
                        type: string
                      proxmoxUsername:
                        type: string
                      quotaCPU:
                        type: integer
                      quotaRAM:
                        type: integer
                      quotaRanges:
                        type: integer
                      quotaStorage:
                        type: integer
                      quotaVMs:
                        type: integer
                      ranges:
                        type: array
                        items:
                          type: string
                      updated:
                        type: string
                      userID:
                        type: string
                      userNumber:
                        type: integer
                      verified:
                        type: boolean
                    required:
                      - avatar
                      - collectionId
                      - collectionName
                      - created
                      - defaultRangeID
                      - emailVisibility
                      - expand
                      - groups
                      - id
                      - isAdmin
                      - lastActive
                      - name
                      - proxmoxRealm
                      - proxmoxUsername
                      - quotaCPU
                      - quotaRAM
                      - quotaRanges
                      - quotaStorage
                      - quotaVMs
                      - ranges
                      - updated
                      - userID
                      - userNumber
